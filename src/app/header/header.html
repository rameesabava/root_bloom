<div>
    <!-- free delivery -->
    <div class="bg-success text-light text-center">
        Free Delivery on Orders Above ₹999
    </div>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" routerLink="/">
                <img src="/logo.png" width="25" height="25" alt="icon">
                <span class="ms-2">Root & Bloom</span>
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">

                <!-- Center Menu -->
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/plants">Plants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/contact">Contact</a>
                    </li>
                </ul>

                <!-- Right Menu -->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-user"></i>
                            @if(auth.loginUsername()){
                            <span>Hi {{auth.loginUsername()}}</span>
                            }
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end">
                            @if (auth.isLoggedIn()){
                            <li><a class="dropdown-item" routerLink="/profile">My Profile</a></li>
                            <li><a class="dropdown-item" routerLink="/cart">My Cart</a></li>
                            <li><button (click)="logout()" class="dropdown-item">Logout</button></li>

                            } @else {
                            <li><a class="dropdown-item" routerLink="/login">Login</a></li>
                            <li><a class="dropdown-item" routerLink="/register">Register</a></li>
                            }

                        </ul>
                    </li>
                </ul>

            </div>

        </div>
    </nav>
</div>
