<div class="container my-4 row">
    <div>
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-3">
            @for (plant of allPlants(); track $index){
            <div class="card" style="width: 18rem;">
                <img height="300px" [src]="serverUrl + '/uploads/' + plant.image" class="card-img-top" alt="image">
                <div class="card-body">
                    <h5>{{plant.name}}</h5>
                    <h6>Price: ₹ {{plant.price}}</h6>
                    <a routerLink="/view"></a>
                </div>
            </div>
            }
        </div>
    </div>
</div>
